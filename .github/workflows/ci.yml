name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Cancel in-flight runs for the same ref so a fast-follow push doesn't queue
# behind a slow build from the previous commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Java 17 is the minimum required by Phoebus; also verify on the
        # current LTS (21) to catch compatibility regressions early.
        java: ["17", "21"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and run tests
        run: mvn --batch-mode verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-java${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 7

      - name: Upload coverage report
        if: matrix.java == '17'
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 30

      - name: Upload JAR artifact
        if: >
          matrix.java == '17' &&
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: micrometer-registry-pva
          path: target/*.jar
          retention-days: 90
